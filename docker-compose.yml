services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://tinyflags:tinyflags@db:5432/tinyflags
      - ENVIRONMENT=local
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tinyflags
      POSTGRES_PASSWORD: tinyflags
      POSTGRES_DB: tinyflags
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinyflags"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
